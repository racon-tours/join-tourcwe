<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Today's Menu | Forest Park Picnics</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #628395;
      --gold: #d6ce93;
      --cream: #efebce;
      --dark: #1c1c1c;
      --sage: #607466;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Nunito', system-ui, sans-serif;
      --font-brand: 'Ubuntu', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header img { height: 28px; width: auto; }
    header a.book-link {
      color: var(--gold);
      font-size: .8rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: .03em;
    }

    /* ── Hero ───────────────────────────────── */
    .hero {
      padding: 32px 20px 24px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .hero .eyebrow {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 7vw, 2.8rem);
      font-style: italic;
      font-weight: 400;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .hero .sub {
      font-size: .88rem;
      color: rgba(255,255,255,.45);
    }

    /* ── Section picker ─────────────────────── */
    .picker {
      display: flex;
      gap: 10px;
      padding: 20px 20px 0;
      max-width: 540px;
      margin: 0 auto;
    }
    .picker-btn {
      flex: 1;
      padding: 14px 12px;
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 10px;
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.5);
      font-family: var(--font-body);
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      line-height: 1.3;
      text-decoration: none;
      display: block;
    }
    .picker-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .picker-btn .label { display: block; }
    .picker-btn:hover {
      border-color: rgba(255,255,255,.3);
      color: rgba(255,255,255,.8);
    }
    .picker-btn.active {
      border-color: var(--gold);
      background: rgba(214,206,147,.08);
      color: var(--gold);
    }

    /* ── Menu content ───────────────────────── */
    .menu-content {
      max-width: 540px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .menu-section {
      padding-top: 28px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-style: italic;
      color: #fff;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .restaurant-block { margin-bottom: 26px; }

    .restaurant-name {
      font-family: var(--font-brand);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .dish {
      margin-bottom: 12px;
      padding-left: 0;
    }
    .dish-name {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .dish-note {
      font-size: .86rem;
      color: rgba(255,255,255,.55);
      line-height: 1.55;
    }

    /* ── Divider ────────────────────────────── */
    .section-divider {
      border: none;
      height: 1px;
      background: rgba(255,255,255,.08);
      margin: 8px 0 0;
    }

    /* ── Footer bar ─────────────────────────── */
    .footer-bar {
      max-width: 540px;
      margin: 24px auto 0;
      padding: 0 20px 48px;
    }
    .return-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-left: 3px solid var(--gold);
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    .return-card .label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .return-card p {
      font-size: .9rem;
      color: rgba(255,255,255,.65);
      line-height: 1.6;
    }
    .contact-line {
      text-align: center;
      font-size: .86rem;
      color: rgba(255,255,255,.4);
      padding-top: 4px;
    }
    .contact-line a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
    }

    /* ── Loading / error ────────────────────── */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,255,.35);
      font-size: .95rem;
    }
  </style>
</head>
<body>

<header>
  <a href="/"><img src="/assets/logo/lockup-horizontal-on-dark.svg" alt="TourCWE / Forest Park Picnics"></a>
  <a href="https://forestparkpicnics.com/" class="book-link">Book a Picnic &#8599;</a>
</header>

<div class="hero">
  <p class="eyebrow">Forest Park Picnics</p>
  <h1>Today's Menu</h1>
  <p class="sub">Tap your picnic below to see what's in your basket.</p>
</div>

<div class="picker">
  <a href="#art-hill" class="picker-btn" id="btn-art-hill" onclick="activateSection('art-hill')">
    <span class="icon">🍱</span>
    <span class="label">Art Hill Picnic</span>
  </a>
  <a href="#muny" class="picker-btn" id="btn-muny" onclick="activateSection('muny')">
    <span class="icon">🎭</span>
    <span class="label">Pagoda Lake<br>(Muny)</span>
  </a>
</div>

<div class="menu-content">
  <div id="menu-body">
    <div class="state-msg">Loading menu&hellip;</div>
  </div>
</div>

<div class="footer-bar" id="footer-bar" style="display:none">
  <div class="return-card">
    <div class="label">When finished</div>
    <p id="return-text"></p>
  </div>
  <p class="contact-line">
    For help, text or call <a id="contact-link" href="tel:+13143123549">314-312-3549</a>
  </p>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1MiNc2fqE30aVjm64aNXOEiZ_KFIFYlTvbWcCW_OVJvc_LKlBfEdEvNe3hTqiMW79QLjfM3qS2Fzu/pub?output=csv';

// ── CSV parser ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (c === ',' && !inQuote) {
        cols.push(cur.trim()); cur = '';
      } else {
        cur += c;
      }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// ── Build menu sections from parsed rows ──────────────────────────────────────
function buildMenuData(rows) {
  let returnNote = '', contact = '';
  const artHill = [], muny = [];

  for (const row of rows) {
    const type = (row[0] || '').trim().toUpperCase();
    if (!type || type.startsWith('--') || type === 'PICNIC') continue;

    if (type === 'RETURN') { returnNote = row[1] || ''; continue; }
    if (type === 'CONTACT') { contact = row[1] || ''; continue; }

    const item = { restaurant: row[1] || '', dish: row[2] || '', note: row[3] || '' };
    if (!item.restaurant || !item.dish) continue;

    if (type === 'ART_HILL') artHill.push(item);
    if (type === 'MUNY') muny.push(item);
  }

  return { returnNote, contact, artHill, muny };
}

// ── Group items by restaurant ──────────────────────────────────────────────────
function groupByRestaurant(items) {
  const map = new Map();
  for (const item of items) {
    if (!map.has(item.restaurant)) map.set(item.restaurant, []);
    map.get(item.restaurant).push({ dish: item.dish, note: item.note });
  }
  return map;
}

// ── Render a section ──────────────────────────────────────────────────────────
function renderSection(id, title, items) {
  const grouped = groupByRestaurant(items);
  if (!grouped.size) return '';

  let html = `<div class="menu-section" id="${id}">
    <h2 class="section-title">${title}</h2>`;

  for (const [restaurant, dishes] of grouped) {
    html += `<div class="restaurant-block">
      <div class="restaurant-name">${esc(restaurant)}</div>`;
    for (const d of dishes) {
      html += `<div class="dish">
        <div class="dish-name">${esc(d.dish)}</div>`;
      if (d.note) html += `<div class="dish-note">${esc(d.note)}</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Section switcher ──────────────────────────────────────────────────────────
let menuData = null;

function activateSection(section) {
  document.getElementById('btn-art-hill').classList.toggle('active', section === 'art-hill');
  document.getElementById('btn-muny').classList.toggle('active', section === 'muny');
  if (!menuData) return;

  const body = document.getElementById('menu-body');
  if (section === 'art-hill') {
    body.innerHTML = renderSection('art-hill', 'Art Hill Picnic', menuData.artHill)
      || '<div class="state-msg">Art Hill menu not set yet.</div>';
  } else {
    body.innerHTML = renderSection('muny', 'Pagoda Lake (Muny) Picnic', menuData.muny)
      || '<div class="state-msg">Muny menu not set yet.</div>';
  }

  // smooth scroll to section after short delay
  setTimeout(() => {
    const el = document.getElementById(section === 'art-hill' ? 'art-hill' : 'muny');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadMenu() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const rows = parseCSV(text);
    menuData = buildMenuData(rows);

    // Determine initial section from URL hash
    const hash = location.hash.replace('#','').toLowerCase();
    const initialSection = hash === 'muny' ? 'muny' : 'art-hill';
    activateSection(initialSection);

    // Footer
    if (menuData.returnNote) {
      document.getElementById('return-text').textContent = menuData.returnNote;
      document.getElementById('footer-bar').style.display = '';
    }
    if (menuData.contact) {
      const cl = document.getElementById('contact-link');
      cl.textContent = menuData.contact;
      cl.href = 'tel:+1' + menuData.contact.replace(/\D/g,'');
    }
  } catch {
    document.getElementById('menu-body').innerHTML =
      '<div class="state-msg">Menu unavailable right now.<br>Call 314-312-3549 for today\'s selections.</div>';
  }
}

// Handle hash changes
window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#','').toLowerCase();
  if (hash === 'muny') activateSection('muny');
  else if (hash === 'art-hill') activateSection('art-hill');
});

loadMenu();
</script>
</body>
</html>
