<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Today's Menu | Forest Park Picnics</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #628395;
      --gold: #d6ce93;
      --cream: #efebce;
      --dark: #1c1c1c;
      --sage: #607466;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Nunito', system-ui, sans-serif;
      --font-brand: 'Ubuntu', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--dark); color: var(--cream); min-height: 100vh; }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header img { height: 28px; width: auto; }
    header a.book-link { color: var(--gold); font-size: .8rem; font-weight: 700; text-decoration: none; }

    /* ── Hero ───────────────────────────────── */
    .hero { padding: 28px 20px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.06); }
    .hero .eyebrow { font-size: .72rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .hero h1 { font-family: var(--font-display); font-size: clamp(1.9rem, 7vw, 2.8rem); font-style: italic; color: #fff; line-height: 1.1; margin-bottom: 6px; }
    .hero .sub { font-size: .86rem; color: rgba(255,255,255,.4); }

    /* ── Section picker ─────────────────────── */
    .picker { display: flex; gap: 10px; padding: 18px 16px; max-width: 540px; margin: 0 auto; }
    .picker-btn {
      flex: 1; padding: 14px 10px; border: 2px solid rgba(255,255,255,.12);
      border-radius: 10px; background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.45); font-family: var(--font-body); font-size: .85rem;
      font-weight: 700; cursor: pointer; text-align: center; line-height: 1.3;
      text-decoration: none; display: block; transition: border-color .2s, color .2s, background .2s;
    }
    .picker-btn .icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .picker-btn:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.75); }
    .picker-btn.active { border-color: var(--gold); background: rgba(214,206,147,.07); color: var(--gold); }

    /* ── Menu wrapper ───────────────────────── */
    .menu-content { max-width: 540px; margin: 0 auto; padding: 0 16px 16px; }

    /* ── Partner card ───────────────────────── */
    .partner-card {
      margin-top: 20px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 12px;
      overflow: hidden;
    }

    .partner-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    /* Logo badge */
    .partner-logo {
      width: 52px; height: 52px; border-radius: 10px;
      flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 700; font-size: 1.1rem;
      color: #fff; letter-spacing: -.01em;
    }
    .partner-logo img { width: 100%; height: 100%; object-fit: cover; }

    .partner-info { flex: 1; min-width: 0; }
    .partner-name {
      font-family: var(--font-brand); font-size: 1rem; font-weight: 700;
      color: #fff; margin-bottom: 3px; line-height: 1.2;
    }
    .partner-tagline {
      font-size: .78rem; color: rgba(255,255,255,.5); line-height: 1.4;
      margin-bottom: 10px;
    }

    /* Partner links row */
    .partner-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .partner-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700; text-decoration: none;
      border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.6);
      transition: all .18s; white-space: nowrap;
    }
    .partner-link:hover { border-color: rgba(255,255,255,.3); color: #fff; }
    .partner-link.ig:hover { border-color: #e1306c; color: #e1306c; }
    .partner-link.reviews:hover { border-color: #fbbc05; color: #fbbc05; }
    .partner-link svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

    /* ── Dishes ─────────────────────────────── */
    .dishes-list { padding: 12px 16px 16px; }
    .dish { margin-bottom: 12px; }
    .dish:last-child { margin-bottom: 0; }
    .dish-name { font-size: .98rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .dish-note { font-size: .83rem; color: rgba(255,255,255,.5); line-height: 1.5; }

    /* ── Footer ─────────────────────────────── */
    .page-footer { max-width: 540px; margin: 24px auto 0; padding: 0 16px 48px; }
    .return-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09);
      border-left: 3px solid var(--gold); border-radius: 8px; padding: 14px 16px; margin-bottom: 14px;
    }
    .return-label { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
    .return-text { font-size: .88rem; color: rgba(255,255,255,.6); line-height: 1.6; }
    .contact-line { text-align: center; font-size: .83rem; color: rgba(255,255,255,.35); padding-top: 4px; }
    .contact-line a { color: var(--gold); text-decoration: none; font-weight: 700; }

    /* ── States ─────────────────────────────── */
    .state-msg { text-align: center; padding: 48px 20px; color: rgba(255,255,255,.3); font-size: .95rem; }
  </style>
</head>
<body>

<header>
  <a href="/"><img src="/assets/logo/lockup-horizontal-on-dark.svg" alt="TourCWE / Forest Park Picnics"></a>
  <a href="https://forestparkpicnics.com/" class="book-link">Book a Picnic &#8599;</a>
</header>

<div class="hero">
  <p class="eyebrow">Forest Park Picnics</p>
  <h1>Today's Menu</h1>
  <p class="sub">Tap your picnic to see what's in your basket.</p>
</div>

<div class="picker">
  <a href="#art-hill" class="picker-btn" id="btn-art-hill" onclick="activateSection('art-hill')">
    <span class="icon">🍱</span>
    <span>Art Hill<br>Picnic</span>
  </a>
  <a href="#muny" class="picker-btn" id="btn-muny" onclick="activateSection('muny')">
    <span class="icon">🎭</span>
    <span>Pagoda Lake<br>(Muny)</span>
  </a>
</div>

<div class="menu-content" id="menu-body">
  <div class="state-msg">Loading&hellip;</div>
</div>

<div class="page-footer" id="page-footer" style="display:none">
  <div class="return-card">
    <div class="return-label">When finished</div>
    <div class="return-text" id="return-text"></div>
  </div>
  <p class="contact-line">For help, text or call <a id="contact-link" href="tel:+13143123549">314-312-3549</a></p>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1MiNc2fqE30aVjm64aNXOEiZ_KFIFYlTvbWcCW_OVJvc_LKlBfEdEvNe3hTqiMW79QLjfM3qS2Fzu/pub?output=csv';

// ── Partner metadata ──────────────────────────────────────────────────────────
// logo_url: replace '' with a hosted image URL to show a real logo
const PARTNERS = {
  "Straub's Market": {
    tagline: "The neighborhood grocer St. Louis has trusted since 1901.",
    website: "https://www.straubs.com",
    websiteLabel: "straubs.com",
    instagram: "https://www.instagram.com/straubsmarket/",
    instagramHandle: "@straubsmarket",
    googleReviews: "https://maps.google.com/?q=Straub%27s+Fine+Grocers+302+N+Kingshighway+Blvd+St+Louis+MO+63108",
    logo_url: "",
    initials: "S",
    badgeColor: "#2d6a4f"
  },
  "Havana's Cuisine": {
    tagline: "Authentic Cuban cuisine, family-owned. Bread shipped from Tampa's La Segunda Bakery since 1915.",
    website: "https://www.havanascuisine.com",
    websiteLabel: "havanascuisine.com",
    instagram: "https://www.instagram.com/havanas.cuisine/",
    instagramHandle: "@havanas.cuisine",
    googleReviews: "https://maps.google.com/?q=Havana%27s+Cuisine+12+S+Euclid+Ave+St+Louis+MO+63108",
    logo_url: "",
    initials: "HC",
    badgeColor: "#9b2335"
  },
  "The Gramophone": {
    tagline: "Started as a music venue in 2008. The sandwiches won. 25,000 fans on Instagram agree.",
    website: "https://www.gramophonestl.com",
    websiteLabel: "gramophonestl.com",
    instagram: "https://www.instagram.com/thegramophone/",
    instagramHandle: "@thegramophone",
    googleReviews: "https://maps.google.com/?q=The+Gramophone+4243+Manchester+Ave+St+Louis+MO+63110",
    logo_url: "",
    initials: "G",
    badgeColor: "#7d4f14"
  },
  "The Cup": {
    tagline: "St. Louis' original gourmet cupcake bakery. In the CWE since 2007.",
    website: "https://www.cravethecup.com",
    websiteLabel: "cravethecup.com",
    instagram: "https://www.instagram.com/cravethecup/",
    instagramHandle: "@cravethecup",
    googleReviews: "https://maps.google.com/?q=The+Cup+28+Maryland+Plaza+St+Louis+MO+63108",
    logo_url: "",
    initials: "TC",
    badgeColor: "#8b3a62"
  }
};

// ── SVG icons ─────────────────────────────────────────────────────────────────
const ICON_INSTAGRAM = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`;
const ICON_GLOBE = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm-1 21.929V20c-4.062-.479-7.282-3.699-7.761-7.761H5v-2H3.239C3.718 6.179 6.938 2.959 11 2.48V4h2V2.48c4.062.479 7.282 3.699 7.761 7.759H19v2h1.761C20.282 16.301 17.062 19.521 13 20v1.929h-2zM11 18V13H6l6 9v-4h5l-6-9v4h-1z" fill-rule="nonzero"/></svg>`;
const ICON_STAR = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;

// ── CSV parser ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function buildMenuData(rows) {
  let returnNote = '', contact = '';
  const artHill = [], muny = [];
  for (const row of rows) {
    const type = (row[0] || '').trim().toUpperCase();
    if (!type || type.startsWith('--') || type === 'PICNIC') continue;
    if (type === 'RETURN') { returnNote = row[1] || ''; continue; }
    if (type === 'CONTACT') { contact = row[1] || ''; continue; }
    const item = { restaurant: row[1] || '', dish: row[2] || '', note: row[3] || '' };
    if (!item.restaurant || !item.dish) continue;
    if (type === 'ART_HILL') artHill.push(item);
    if (type === 'MUNY') muny.push(item);
  }
  return { returnNote, contact, artHill, muny };
}

function groupByRestaurant(items) {
  const map = new Map();
  for (const item of items) {
    if (!map.has(item.restaurant)) map.set(item.restaurant, []);
    map.get(item.restaurant).push({ dish: item.dish, note: item.note });
  }
  return map;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render a partner card ─────────────────────────────────────────────────────
function renderPartnerCard(restaurantName, dishes) {
  const p = PARTNERS[restaurantName] || {};
  const color = p.badgeColor || '#628395';

  // Logo: real image or styled badge
  const logoHTML = p.logo_url
    ? `<img src="${esc(p.logo_url)}" alt="${esc(restaurantName)} logo">`
    : `<span style="font-size:${p.initials && p.initials.length > 1 ? '.95rem' : '1.2rem'}">${esc(p.initials || restaurantName[0])}</span>`;

  const linksHTML = [
    p.website ? `<a href="${esc(p.website)}" target="_blank" rel="noopener" class="partner-link web">${ICON_GLOBE}${esc(p.websiteLabel || p.website)}</a>` : '',
    p.instagram ? `<a href="${esc(p.instagram)}" target="_blank" rel="noopener" class="partner-link ig">${ICON_INSTAGRAM}${esc(p.instagramHandle || 'Instagram')}</a>` : '',
    p.googleReviews ? `<a href="${esc(p.googleReviews)}" target="_blank" rel="noopener" class="partner-link reviews">${ICON_STAR}Google Reviews</a>` : ''
  ].filter(Boolean).join('');

  const dishesHTML = dishes.map(d => `
    <div class="dish">
      <div class="dish-name">${esc(d.dish)}</div>
      ${d.note ? `<div class="dish-note">${esc(d.note)}</div>` : ''}
    </div>`).join('');

  return `
  <div class="partner-card">
    <div class="partner-header">
      <div class="partner-logo" style="background:${color}">${logoHTML}</div>
      <div class="partner-info">
        <div class="partner-name">${esc(restaurantName)}</div>
        ${p.tagline ? `<div class="partner-tagline">${esc(p.tagline)}</div>` : ''}
        ${linksHTML ? `<div class="partner-links">${linksHTML}</div>` : ''}
      </div>
    </div>
    <div class="dishes-list">${dishesHTML}</div>
  </div>`;
}

// ── Render full section ───────────────────────────────────────────────────────
function renderSection(items) {
  if (!items.length) return '<div class="state-msg">Menu not set yet.</div>';
  const grouped = groupByRestaurant(items);
  return [...grouped.entries()].map(([name, dishes]) => renderPartnerCard(name, dishes)).join('');
}

// ── Section switcher ──────────────────────────────────────────────────────────
let menuData = null;

function activateSection(section) {
  document.getElementById('btn-art-hill').classList.toggle('active', section === 'art-hill');
  document.getElementById('btn-muny').classList.toggle('active', section === 'muny');
  if (!menuData) return;
  const body = document.getElementById('menu-body');
  body.innerHTML = renderSection(section === 'muny' ? menuData.muny : menuData.artHill);
  setTimeout(() => window.scrollTo({ top: document.querySelector('.picker').offsetTop - 12, behavior: 'smooth' }), 50);
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadMenu() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    menuData = buildMenuData(parseCSV(await res.text()));
    const hash = location.hash.replace('#','').toLowerCase();
    activateSection(hash === 'muny' ? 'muny' : 'art-hill');
    if (menuData.returnNote) {
      document.getElementById('return-text').textContent = menuData.returnNote;
      document.getElementById('page-footer').style.display = '';
    }
    if (menuData.contact) {
      const cl = document.getElementById('contact-link');
      cl.textContent = menuData.contact;
      cl.href = 'tel:+1' + menuData.contact.replace(/\D/g,'');
    }
  } catch {
    document.getElementById('menu-body').innerHTML =
      '<div class="state-msg">Menu unavailable right now.<br>Call 314-312-3549 for today\'s selections.</div>';
  }
}

window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#','').toLowerCase();
  if (h === 'muny' || h === 'art-hill') activateSection(h);
});

loadMenu();
</script>
</body>
</html>
