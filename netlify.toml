[build]
  publish = "."

[[redirects]]
  from = "/tours"
  to = "/tour/"
  status = 301

[[redirects]]
  from = "/tour"
  to = "/tour/"
  status = 301

# ---------------------------------------------------------------------------
# Legacy URLs from the pre-rebuild site (still indexed by Google, now 404ing).
# Each 301 reclaims the ranking authority by sending it to today's equivalent.
# Initial batch added 2026-04-22; SEO sprint additions 2026-04-26 below.
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/contact"
  to = "/tour/#book"
  status = 301

[[redirects]]
  from = "/dressels"
  to = "/blog/dressels-public-house/"
  status = 301

[[redirects]]
  from = "/gramophone"
  to = "/blog/gramophone/"
  status = 301

[[redirects]]
  from = "/straubs"
  to = "/blog/straubs-market/"
  status = 301

[[redirects]]
  from = "/havanas"
  to = "/blog/havanas-cuisine/"
  status = 301

[[redirects]]
  from = "/omg"
  to = "/blog/omg-in-the-cwe/"
  status = 301

# 2026-04-26 SEO sprint additions: GSC showed these old paths still
# indexed and bleeding impressions into 404s. Verified targets via
# racon.tours archive.

[[redirects]]
  from = "/the-perfect-st-louis-food-tour"
  to = "/tour/"
  status = 301

# Specific product slugs from the old /tours/iconicstl/ taxonomy
# (715 + 112 impressions over last 90 days). MUST come before the
# /tours/* catch-all below.

[[redirects]]
  from = "/tours/iconicstl/iconic-stl-flavors-central-west-end-food-history-walking-tour"
  to = "/tour/"
  status = 301

[[redirects]]
  from = "/tours/iconicstl/omg-in-the-cwe-best-of-the-central-west-end-food-history-tour"
  to = "/blog/omg-in-the-cwe/"
  status = 301

# Catch-all for any other /tours/<deep-path> still floating in the index.
[[redirects]]
  from = "/tours/*"
  to = "/tour/"
  status = 301

# ---------------------------------------------------------------------------
# Forest Park Picnics lives at its own domain now.
# force=true is required where /picnics/*/index.html still exist in the repo.
# Specific product rules MUST come before the catch-all.
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/picnics/art-hill"
  to = "https://forestparkpicnics.com/art-hill-picnic-st-louis"
  status = 301
  force = true

[[redirects]]
  from = "/picnics/art-hill/*"
  to = "https://forestparkpicnics.com/art-hill-picnic-st-louis"
  status = 301
  force = true

[[redirects]]
  from = "/picnics/muny"
  to = "https://forestparkpicnics.com/pagoda-lake-picnic-st-louis"
  status = 301
  force = true

[[redirects]]
  from = "/picnics/muny/*"
  to = "https://forestparkpicnics.com/pagoda-lake-picnic-st-louis"
  status = 301
  force = true

[[redirects]]
  from = "/picnic"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[redirects]]
  from = "/picnic/*"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[redirects]]
  from = "/picnics"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

[[redirects]]
  from = "/picnics/*"
  to = "https://forestparkpicnics.com/"
  status = 301
  force = true

# 2026-04-26 SEO sprint additions: legacy partner landing pages now
# resolve to the FPP partners page (mass-market partner channel lives
# at FPP per current marketing positioning). No file conflicts so no
# force needed.

[[redirects]]
  from = "/yeschef"
  to = "https://forestparkpicnics.com/partners"
  status = 301

[[redirects]]
  from = "/partner"
  to = "https://forestparkpicnics.com/partners"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
