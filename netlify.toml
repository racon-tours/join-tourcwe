[build]
  publish = "."

[[redirects]]
  from = "/tours"
  to = "/tour/"
  status = 301

[[redirects]]
  from = "/tour"
  to = "/tour/"
  status = 301

[[redirects]]
  from = "/picnic"
  to = "/picnics/"
  status = 301

[[redirects]]
  from = "/picnic/*"
  to = "/picnics/:splat"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
